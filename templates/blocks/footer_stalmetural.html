<!-- ================= ФУТЕР ================= -->
        <table class="row-content" width="640" border="0" cellpadding="0" cellspacing="0" role="presentation" style="margin: 0 auto; background-image: url('{{FOOTER_BG_IMG}}'); background-color: {{FOOTER_BG_COLOR}}; background-size: cover; background-position: center; border-radius: 0 0 5px 5px;">
          <!-- Ряд 1: Логотип и Меню -->
          <tr>
            <td style="padding: 15px 25px 0px;">
              <table width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation">
                <tr>
                  <td width="160" align="left" valign="middle" style="line-height: 1;">
                    <a href="{{LINK_LOGO}}" target="_blank">
                      <img src="{{BRAND_LOGO}}" width="160" border="0" style="display: block;">
                    </a>
                  </td>
                  <td class="mobile-hide" align="right" valign="middle">
                    <table border="0" cellpadding="0" cellspacing="0" role="presentation" align="right">
                      <tr>
                        <td style="padding-right: 35px; white-space: nowrap;">
                          <a href="{{LINK_CATALOG}}" style="font-family: Helvetica Neue, Helvetica, Arial, sans-serif; font-size: 14px; font-weight: bold; color: {{FOOTER_TEXT_COLOR}}; text-decoration: none;">Каталог</a>
                        </td>
                        <td style="padding-right: 35px; white-space: nowrap;">
                          <a href="{{LINK_COMPANY}}" style="font-family: Helvetica Neue, Helvetica, Arial, sans-serif; font-size: 14px; font-weight: bold; color: {{FOOTER_TEXT_COLOR}}; text-decoration: none;">О компании</a>
                        </td>
                        <td style="white-space: nowrap;">
                          <a href="{{LINK_DELIVERY}}" style="font-family: Helvetica Neue, Helvetica, Arial, sans-serif; font-size: 14px; font-weight: bold; color: {{FOOTER_TEXT_COLOR}}; text-decoration: none;">Доставка и оплата</a>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <!-- Ряд 2: Email и Телефон -->
          <tr>
            <td style="padding: 10px 25px 15px;">
              <table width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation">
                <tr>
                  <td align="left" style="font-family: Helvetica Neue, Helvetica, Arial, sans-serif; font-size: 14px; color: {{FOOTER_TEXT_COLOR}};">
                    <strong>{{EMAIL}}</strong>
                  </td>
                  <td align="right" style="font-family: Helvetica Neue, Helvetica, Arial, sans-serif; font-size: 14px; color: {{FOOTER_TEXT_COLOR}}; font-weight: bold;">
                    {{PHONE}}
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <!-- Дисклеймер -->
          <tr>
            <td style="padding: 10px 5px 5px;">
              <div style="font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 13px; color: {{FOOTER_TEXT_COLOR}}; text-align: center; line-height: 1.4;">
                <div style="padding-bottom: 5px;">Вы получили это письмо на {{email}}, так как запрашивали цены на нашем сайте.</div>
                <div style="padding-bottom: 5px;">
                  <a href="{{UnsubscribeUrl}}" style="color: {{FOOTER_TEXT_COLOR}}; text-decoration: underline;">Отписаться здесь</a> |
                  <a href="{{webversion}}" style="color: {{FOOTER_TEXT_COLOR}}; text-decoration: underline;">Веб-версия</a>
                </div>
                <div>{{FOOTER_ADDRESS}}</div>
              </div>
            </td>
          </tr>
        </table>
